<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battery Status API Demo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    /* Battery Icon */
    .battery-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 30px 0;
    }

    .battery {
      width: 200px;
      height: 100px;
      border: 4px solid #333;
      border-radius: 10px;
      position: relative;
      padding: 5px;
      background: #f5f5f5;
    }

    .battery::before {
      content: '';
      position: absolute;
      right: -12px;
      top: 50%;
      transform: translateY(-50%);
      width: 10px;
      height: 40px;
      background: #333;
      border-radius: 0 5px 5px 0;
    }

    .battery-level {
      height: 100%;
      background: linear-gradient(90deg, #f44336, #ffeb3b, #4caf50);
      border-radius: 5px;
      transition: width 0.5s ease, background 0.5s ease;
      position: relative;
    }

    .battery-percent {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      font-weight: bold;
      color: #333;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
    }

    .charging-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 40px;
      display: none;
      z-index: 10;
    }

    .charging-indicator.show {
      display: block;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Info Cards */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 30px;
    }

    .info-card {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      border-left: 4px solid #667eea;
    }

    .info-card .label {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .info-card .value {
      font-size: 20px;
      font-weight: bold;
      color: #333;
    }

    .info-card .value.charging {
      color: #4caf50;
    }

    .info-card .value.discharging {
      color: #f44336;
    }

    /* Status Messages */
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      display: none;
    }

    .status.warning {
      background: #fff3e0;
      color: #e65100;
      display: block;
    }

    .status.critical {
      background: #ffebee;
      color: #c62828;
      display: block;
    }

    .status.info {
      background: #e3f2fd;
      color: #1565c0;
      display: block;
    }

    /* Support Check */
    .support-check {
      text-align: center;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .support-check.supported {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .support-check.not-supported {
      background: #ffebee;
      color: #c62828;
    }

    /* Log */
    .log-container {
      margin-top: 20px;
      background: #263238;
      border-radius: 10px;
      padding: 15px;
      max-height: 150px;
      overflow-y: auto;
    }

    .log-title {
      color: #aed581;
      font-size: 12px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .log-entry {
      color: #cfd8dc;
      font-size: 11px;
      font-family: monospace;
      margin: 5px 0;
    }

    .log-entry.warning {
      color: #ffb74d;
    }

    .log-entry.success {
      color: #81c784;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔋 Battery Status API</h1>
    <p class="subtitle">Мониторинг состояния батареи устройства</p>

    <!-- Support Check -->
    <div id="supportCheck" class="support-check">
      Проверка поддержки...
    </div>

    <!-- Battery Visual -->
    <div class="battery-container">
      <div class="battery">
        <div class="battery-level" id="batteryLevel">
          <span class="battery-percent" id="batteryPercent">--%</span>
        </div>
        <div class="charging-indicator" id="chargingIcon">⚡</div>
      </div>
    </div>

    <!-- Info Cards -->
    <div class="info-grid">
      <div class="info-card">
        <div class="label">Заряд</div>
        <div class="value" id="levelValue">--%</div>
      </div>
      <div class="info-card">
        <div class="label">Статус</div>
        <div class="value" id="chargingValue">--</div>
      </div>
      <div class="info-card">
        <div class="label">До разрядки</div>
        <div class="value discharging" id="dischargingValue">--</div>
      </div>
      <div class="info-card">
        <div class="label">До зарядки</div>
        <div class="value charging" id="chargingTimeValue">--</div>
      </div>
    </div>

    <!-- Status Messages -->
    <div id="statusWarning" class="status warning">
      ⚠️ Низкий заряд батареи! Подключите устройство к сети.
    </div>

    <div id="statusCritical" class="status critical">
      🚨 Критически низкий заряд! Срочно подключите к сети!
    </div>

    <div id="statusCharging" class="status info">
      🔌 Устройство подключено к сети
    </div>

    <!-- Event Log -->
    <div class="log-container">
      <div class="log-title">📋 Журнал событий</div>
      <div id="eventLog"></div>
    </div>
  </div>

  <script>
    // ===== Логирование =====
    function log(message, type = 'info') {
      const logDiv = document.getElementById('eventLog');
      const time = new Date().toLocaleTimeString();
      const className = type === 'warning' ? 'warning' : type === 'success' ? 'success' : '';
      logDiv.innerHTML += `<div class="log-entry ${className}">[${time}] ${message}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    // ===== Обновление UI =====
    function updateBatteryUI(battery) {
      const level = Math.round(battery.level * 100);
      const isCharging = battery.charging;

      // Обновление визуального уровня
      const batteryLevel = document.getElementById('batteryLevel');
      const batteryPercent = document.getElementById('batteryPercent');
      batteryLevel.style.width = `${level}%`;
      batteryPercent.textContent = `${level}%`;

      // Цвет в зависимости от уровня
      if (level <= 20) {
        batteryLevel.style.background = '#f44336';
      } else if (level <= 50) {
        batteryLevel.style.background = '#ffeb3b';
      } else {
        batteryLevel.style.background = '#4caf50';
      }

      // Индикатор зарядки
      const chargingIcon = document.getElementById('chargingIcon');
      if (isCharging) {
        chargingIcon.classList.add('show');
        document.getElementById('statusCharging').style.display = 'block';
        document.getElementById('chargingValue').textContent = 'Заряжается';
        document.getElementById('chargingValue').className = 'value charging';
      } else {
        chargingIcon.classList.remove('show');
        document.getElementById('statusCharging').style.display = 'none';
        document.getElementById('chargingValue').textContent = 'Не заряжается';
        document.getElementById('chargingValue').className = 'value discharging';
      }

      // Уровень
      document.getElementById('levelValue').textContent = `${level}%`;

      // Время до разрядки
      const dischargingTime = document.getElementById('dischargingValue');
      if (battery.dischargingTime === Infinity) {
        dischargingTime.textContent = '∞';
      } else {
        const minutes = Math.round(battery.dischargingTime / 60);
        dischargingTime.textContent = `~${minutes} мин`;
      }

      // Время до полной зарядки
      const chargingTime = document.getElementById('chargingTimeValue');
      if (battery.chargingTime === Infinity) {
        chargingTime.textContent = '∞';
      } else {
        const minutes = Math.round(battery.chargingTime / 60);
        chargingTime.textContent = `~${minutes} мин`;
      }

      // Предупреждения
      document.getElementById('statusWarning').style.display = level <= 20 && !isCharging ? 'block' : 'none';
      document.getElementById('statusCritical').style.display = level <= 10 && !isCharging ? 'block' : 'none';

      // Логирование
      if (level <= 20 && !isCharging) {
        log(`⚠️ Низкий заряд: ${level}%`, 'warning');
      }
    }

    // ===== Инициализация =====
    async function initBatteryAPI() {
      const supportCheck = document.getElementById('supportCheck');

      // Проверяем поддержку API
      if ('getBattery' in navigator) {
        supportCheck.className = 'support-check supported';
        supportCheck.textContent = '✅ Battery Status API поддерживается';
        log('Battery API доступен', 'success');

        try {
          const battery = await navigator.getBattery();

          // Первоначальное обновление
          updateBatteryUI(battery);
          log(`Инициализация: ${Math.round(battery.level * 100)}%, ${battery.charging ? 'заряжается' : 'не заряжается'}`, 'success');

          // Слушаем изменения уровня
          battery.addEventListener('levelchange', () => {
            const level = Math.round(battery.level * 100);
            log(`Изменение заряда: ${level}%`);
            updateBatteryUI(battery);

            if (level < 20 && !battery.charging) {
              log('⚠️ ВНИМАНИЕ: Низкий заряд!', 'warning');
            }
          });

          // Слушаем изменения статуса зарядки
          battery.addEventListener('chargingchange', () => {
            const status = battery.charging ? 'подключено к сети' : 'отключено от сети';
            log(`Зарядка: ${status}`);
            updateBatteryUI(battery);
          });

          // Слушаем изменения времени разрядки
          battery.addEventListener('dischargingtimechange', () => {
            if (battery.dischargingTime !== Infinity) {
              const minutes = Math.round(battery.dischargingTime / 60);
              log(`Время работы: ~${minutes} мин`);
              updateBatteryUI(battery);
            }
          });

          // Слушаем изменения времени зарядки
          battery.addEventListener('chargingtimechange', () => {
            if (battery.chargingTime !== Infinity) {
              const minutes = Math.round(battery.chargingTime / 60);
              log(`Время зарядки: ~${minutes} мин`);
              updateBatteryUI(battery);
            }
          });

        } catch (error) {
          log(`Ошибка доступа к батарее: ${error.message}`, 'warning');
          document.getElementById('supportCheck').textContent = '❌ Ошибка доступа к API';
          document.getElementById('supportCheck').className = 'support-check not-supported';
        }
      } else {
        supportCheck.className = 'support-check not-supported';
        supportCheck.textContent = '❌ Battery Status API не поддерживается';
        log('Battery API не доступен в этом браузере', 'warning');

        // Блокируем UI
        document.querySelectorAll('.info-card .value').forEach(el => {
          el.textContent = 'N/A';
        });
        document.getElementById('batteryPercent').textContent = '--%';
        document.getElementById('batteryLevel').style.width = '0%';
      }
    }

    // Запуск при загрузке
    document.addEventListener('DOMContentLoaded', initBatteryAPI);
  </script>
</body>
</html>
