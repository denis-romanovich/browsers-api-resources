<!DOCTYPE html>
<html>
<head>
    <title>Credential Management Demo</title>
    <style>
        body { font-family: system-ui; max-width: 400px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 8px; margin: 5px 0; }
        button { padding: 10px; margin: 5px 0; cursor: pointer; background: #007AFF; color: white; border: none; border-radius: 6px; width: 100%; }
        .status { padding: 10px; margin: 10px 0; border-radius: 6px; background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>🔐 Credential Management</h1>
    
    <div id="status" class="status"></div>
    
    <input type="text" id="username" placeholder="Имя пользователя">
    <input type="password" id="password" placeholder="Пароль">
    <button onclick="login()">Войти</button>
    <button onclick="autoLogin()">Автоматический вход</button>
    <button onclick="clearCredentials()">Очистить сохранённые</button>
    
    <script>
        const status = document.getElementById('status');
        
        // Проверка поддержки
        if (!window.PasswordCredential) {
            status.innerHTML = '❌ Credential Management API не поддерживается';
        }
        
        // Сохранение учётных данных
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                status.innerHTML = '⚠️ Введите логин и пароль';
                return;
            }
            
            // Создаём объект учётных данных
            const credential = new PasswordCredential({
                id: username,
                password: password,
                name: username,
                iconURL: window.location.origin + '/icon.png'
            });
            
            // Сохраняем в менеджере паролей
            await navigator.credentials.store(credential);
            
            status.innerHTML = `✅ Данные сохранены для ${username}`;
            
            // Здесь обычно отправка на сервер
            // await fetch('/login', { method: 'POST', body: new FormData(...) });
        }
        
        // Автоматический вход
        async function autoLogin() {
            try {
                const credential = await navigator.credentials.get({
                    password: true,
                    mediation: 'required' // 'silent' - без диалога, 'required' - с диалогом
                });
                
                if (credential) {
                    document.getElementById('username').value = credential.id;
                    document.getElementById('password').value = credential.password;
                    status.innerHTML = `✅ Автовход для ${credential.id}`;
                    
                    // Автоматически отправляем форму
                    // document.getElementById('loginForm').submit();
                } else {
                    status.innerHTML = '⚠️ Нет сохранённых данных';
                }
            } catch (err) {
                status.innerHTML = `❌ Ошибка: ${err.message}`;
            }
        }
        
        // Очистка
        async function clearCredentials() {
            await navigator.credentials.preventSilentAccess();
            status.innerHTML = '🗑️ Сохранённые данные очищены';
        }
        
        // Автовход при загрузке
        // window.addEventListener('load', () => {
        //     autoLogin();
        // });
    </script>
</body>
</html>
