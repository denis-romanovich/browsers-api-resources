<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Web Crypto API Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
    button { background: #4285f4; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; margin: 5px; }
    .output { background: #f5f5f5; padding: 15px; border-radius: 5px; margin-top: 15px; word-break: break-all; }
    textarea { width: 100%; height: 80px; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>🔐 Web Crypto API</h1>
  
  <h2>Хеширование (SHA-256)</h2>
  <textarea id="hashInput" placeholder="Введите текст для хеширования"></textarea>
  <button id="hashBtn">🔑 Получить хеш</button>
  <div class="output" id="hashOutput">Хеш появится здесь...</div>
  
  <h2>Шифрование/Дешифрование (AES-GCM)</h2>
  <textarea id="encryptInput" placeholder="Текст для шифрования"></textarea>
  <button id="encryptBtn">🔒 Зашифровать</button>
  <button id="decryptBtn">🔓 Расшифровать</button>
  <div class="output" id="cryptoOutput">Результат...</div>

  <script>
    // ===== Проверка поддержки =====
    if (!window.crypto || !window.crypto.subtle) {
      alert('❌ Web Crypto API не поддерживается');
    }

    // ===== Хеширование =====
    async function hashMessage(message) {
      const encoder = new TextEncoder();
      const data = encoder.encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      return hashHex;
    }

    document.getElementById('hashBtn').addEventListener('click', async () => {
      const input = document.getElementById('hashInput').value;
      const hash = await hashMessage(input);
      document.getElementById('hashOutput').textContent = hash;
    });

    // ===== Генерация ключа AES =====
    async function generateKey() {
      return await crypto.subtle.generateKey(
        { name: 'AES-GCM', length: 256 },
        true,
        ['encrypt', 'decrypt']
      );
    }

    // ===== Шифрование =====
    async function encryptData(key, data) {
      const encoder = new TextEncoder();
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const encrypted = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        key,
        encoder.encode(data)
      );
      return {
        iv: Array.from(iv),
        encrypted: Array.from(new Uint8Array(encrypted))
      };
    }

    // ===== Дешифрование =====
    async function decryptData(key, encryptedData, iv) {
      const decrypted = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: new Uint8Array(iv) },
        key,
        new Uint8Array(encryptedData)
      );
      const decoder = new TextDecoder();
      return decoder.decode(decrypted);
    }

    // ===== Демонстрация шифрования =====
    let storedKey = null;
    let storedEncrypted = null;

    document.getElementById('encryptBtn').addEventListener('click', async () => {
      const input = document.getElementById('encryptInput').value;
      storedKey = await generateKey();
      storedEncrypted = await encryptData(storedKey, input);
      document.getElementById('cryptoOutput').textContent = 
        `🔒 Зашифровано: ${JSON.stringify(storedEncrypted.encrypted.slice(0, 20))}...`;
    });

    document.getElementById('decryptBtn').addEventListener('click', async () => {
      if (!storedKey || !storedEncrypted) {
        document.getElementById('cryptoOutput').textContent = '❌ Сначала зашифруйте данные';
        return;
      }
      const decrypted = await decryptData(storedKey, storedEncrypted.encrypted, storedEncrypted.iv);
      document.getElementById('cryptoOutput').textContent = `🔓 Расшифровано: ${decrypted}`;
    });
  </script>
</body>
</html>
